server {
  listen 8000;
  server_name _;

  location = /health {
    return 200 "ok";
    add_header Content-Type text/plain;
  }

  location /rest/v1/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, Prefer";
      add_header Content-Length 0;
      return 204;
    }

    rewrite ^/rest/v1/(.*)$ /$1 break;
    proxy_pass http://rest:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, Prefer" always;
  }

  location = /rest/v1 {
    proxy_pass http://rest:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    return 404 "REST endpoint aktif di /rest/v1";
    add_header Content-Type text/plain;
  }
}

